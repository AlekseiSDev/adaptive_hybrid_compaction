<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <style>
    .box { stroke: #2c5cb3; stroke-width: 1.5; fill: #e6f0ff; rx: 6; }
    .ic { fill: #ffd966; stroke: #b07d00; stroke-width: 1.5; rx: 6; }
    .vp { fill: #d8f5d2; stroke: #2d7a30; stroke-width: 1.5; rx: 6; }
    .name { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #111; text-anchor: middle; }
    .role { font-family: -apple-system, sans-serif; font-size: 11px; fill: #444; text-anchor: middle; }
    .title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #111; text-anchor: middle; }
    .legend-text { font-family: -apple-system, sans-serif; font-size: 11px; fill: #333; text-anchor: start; }
    .ln { stroke: #777; stroke-width: 1; fill: none; }
  </style>

  <text x="400" y="26" class="title">Acme Corp — Engineering org (Q2 2026)</text>

  <!-- Level 0: CEO -->
  <rect x="340" y="50" width="120" height="48" class="ic"/>
