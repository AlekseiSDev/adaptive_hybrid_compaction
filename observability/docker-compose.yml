# Langfuse v3 self-hosted stack для local dev / observability sidekick.
# Pinned версии (per design/B_eval-harness.md §9.5 risk: schema mismatch on upgrade).
# Default credentials = INSECURE; меняй для anything beyond localhost dev.
# Запуск:  docker compose -f observability/docker-compose.yml up -d
# UI:      http://localhost:3001
# Stop:    docker compose -f observability/docker-compose.yml down
# Wipe:    docker compose -f observability/docker-compose.yml down -v   (удаляет данные)

name: ahc-observability

services:
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ahc-dev-nextauth-secret-CHANGEME
      SALT: ahc-dev-salt-CHANGEME
      # Generated openssl rand -hex 32 для local dev — рандом, чтобы Zod hex check
      # пропустил. Для production override в .env.local + secrets.
      ENCRYPTION_KEY: a21fa4b217d23206b610069ba863d6ee667ce8116908d1b377495d40c894e5b9
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: redis
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # Headless bootstrap (B4) — pre-create org/project/admin user/API keys.
      # Idempotent: re-applied на subsequent restarts без error. Values must
      # match LANGFUSE_PUBLIC_KEY/LANGFUSE_SECRET_KEY in .env.example для local dev.
      # Не quote'им values (per Langfuse docs).
      LANGFUSE_INIT_ORG_ID: ahc-dev
      LANGFUSE_INIT_ORG_NAME: AHC Dev
      LANGFUSE_INIT_PROJECT_ID: ahc
      LANGFUSE_INIT_PROJECT_NAME: AHC eval
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-ahc-dev-deterministic
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-ahc-dev-deterministic
      LANGFUSE_INIT_USER_EMAIL: dev@ahc.local
      LANGFUSE_INIT_USER_NAME: AHC Dev
      LANGFUSE_INIT_USER_PASSWORD: ahc-dev-CHANGEME

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      SALT: ahc-dev-salt-CHANGEME
      # Generated openssl rand -hex 32 для local dev — рандом, чтобы Zod hex check
      # пропустил. Для production override в .env.local + secrets.
      ENCRYPTION_KEY: a21fa4b217d23206b610069ba863d6ee667ce8116908d1b377495d40c894e5b9
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: redis
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

  postgres:
    image: docker.io/postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24.12-alpine
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./data/clickhouse-logs:/var/log/clickhouse-server
      # Force IPv4-only listen host (Docker Desktop без IPv6 в контейнерах).
      - ./clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    healthcheck:
      # 127.0.0.1 (not localhost) — wget resolves localhost to ::1 first; container
      # is IPv4-only (см. listen.xml override).
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/redis:7
    restart: always
    command: ["redis-server", "--requirepass", "redis"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: create `langfuse` bucket в MinIO (langfuse-web падает на S3 upload
  # если bucket не существует). Idempotent через --ignore-existing.
  minio-init:
    image: docker.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minio miniosecret &&
        mc mb local/langfuse --ignore-existing &&
        echo "minio-init: bucket 'langfuse' ready"

# Volumes are bind-mounted under observability/data/ (gitignored).
