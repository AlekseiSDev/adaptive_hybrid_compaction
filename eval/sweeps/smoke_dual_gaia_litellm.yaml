name: smoke_dual_gaia_litellm
# Dual-mode routing smoke (2026-05-27) — gaia-med × LiteLLM endpoint.
# Verifies resolveLLMClient default path on agentic bench (5 GAIA tools).
#
# Both AHC (`gaia_bench_agent_ahc`) and Mastra (`mastra-agent`) read
# AHC_ACTOR_MODEL env or fall back to default (`openai/gpt-5.4-mini`) → LiteLLM.
# Neither reads config.ahc_flags.model on gaia bench dispatch path.
#
# Live deps: LITELLM_BASE_URL + LITELLM_MASTER_KEY, plus web_search provider
# (SearXNG/Tavily/Brave/MOCK_WEB_SEARCH) for tool execution.
# Run: pnpm tsx scripts/eval.ts --sweep eval/sweeps/smoke_dual_gaia_litellm.yaml \
#        --max-tasks-per-cell=1 --skip-auth-check

benches:
  - gaia-med

configs:
  - id: ahc_gaia_litellm
    baseline: gaia_bench_agent_ahc
    ahc_flags:
      TASK_AWARE_EXTRACTION: true
      TYPE_AWARE_OFFLOAD: true
      TRAJECTORY_CLASSIFIER: true
      RECALL_TOOL: true
      CONTENT_AWARE_DIGEST: true
    thresholds:
      OBSERVER_THRESHOLD: 64000
      REFLECTION_THRESHOLD: 100000
      TIER3_TOKEN_BUDGET: 64000
  - id: mastra_gaia_litellm
    baseline: mastra-agent

seeds: [42]
budget_usd: 3
