name: main_e1_text_lme_mt
# Track H Phase 1 (2026-05-14) — LME multi-turn replay sweep.
#
# Why: Phase D sweep showed observer (compaction_events.type='observer')
# fires in 0 of 240 records — flag-gated off by default AND single-turn
# longmemeval-med leaves Tier-3 empty (tierize puts first user msg in
# Tier-1). H6.6 path: same baked 120 tasks, but adapter replays each
# of ~47 haystack sessions as a separate user turn. K_RECENT=6 means
# last 6 sessions live in Tier-3 — ~7.8K tokens at session avg ~2.6K.
# OBSERVER_THRESHOLD=4000 (lowered from default 8000) makes observer
# fire reliably on Mode A replay per docs/design/H_ablations_and_TODOs §12.2.
#
# Acceptance gate (per plan): >=80% records carry >=1 observer event in
# ahc_full × lme-multiturn cell. Verify via:
#   pnpm tsx scripts/sanity-aggregate.ts benchmarks/runs/main_e1_text_lme_mt/
# The `obs/off/rec` column on ahc_full cell row should show obs_n >= 16/20.
#
# Per-baseline replay: all 4 baselines drive the same per-session message
# stream via `Baseline.step()` (the canonical multi-turn interface per
# src/eval/types.ts:173-182). full_context accumulates the full history,
# mastra_om triggers OM at its own threshold, anthropic_compact uses
# server-side compact_20260112, ahc_full uses AHC tier rotation. Fair
# comparison: same tasks, same prompt segments, same grader.
#
# Cost (revised post-smoke 2026-05-14): ahc_full × 1 LME task = $0.62 real.
# full_context on 47-session replay accumulates cumulative history quadratically
# (sum_{i=1..47}(session_i tokens) ≈ 2.9M tokens/task on $0.75/M = $2.18/task).
# Original plan estimate of $12 for 4 baselines × n=20 underestimated by ~5×.
# Revised: drop anthropic_compact (Sonnet pricing exacerbates the cumulative-
# history multiplier); ahc_full FIRST in configs list (cheap-first ordering
# so it completes even if CostTracker halts mid-sweep); n=10 not 20.
#
# Updated cost estimate:
#   ahc_full       × 10 tasks ≈ $6 (compaction bounds input growth)
#   mastra_om      × 10 tasks ≈ $10 (OM bounds via Mastra ObservationalMemory)
#   full_context   × 10 tasks ≈ $22 (no compaction — full cumulative history)
#   total ≈ $38, budget_usd=40 → halt at $60.
#
# anthropic_compact deferred to P3 (cache_hit_e3 sweep — separately verifies
# Anthropic-protocol cache rate on real LME).
#
# Run:
#   set -a && . ./.env && set +a
#   pnpm tsx scripts/eval.ts --sweep eval/sweeps/main_e1_text_lme_mt.yaml \
#     --concurrency=5 --max-tasks-per-cell=10

benches:
  - lme-multiturn
configs:
  # ahc_full FIRST — most cost-bounded baseline; on halt, ensure observer
  # density data survives.
  - id: ahc_full
    ahc_flags:
      TASK_AWARE_EXTRACTION: true
      TYPE_AWARE_OFFLOAD: true
      TRAJECTORY_CLASSIFIER: true
      RECALL_TOOL: true
    thresholds:
      OBSERVER_THRESHOLD: 4000
  - id: mastra_om
    baseline: mastra_om
  - id: full_context
    baseline: full_context
seeds: [42]
budget_usd: 40
