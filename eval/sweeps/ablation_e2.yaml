name: ablation_e2
# E2 ablation grid — 3 AHC configs × 2 text benches × 2 seeds = 12 cells.
# Per E_main-runs.md §2 (ablations isolate which AHC component drives the gain).
# ahc_full reference is cross-checked against E1 main_e1_text ahc_full as a
# sanity replication signal before consuming ablation deltas.
#
# E1 budget hedge: dropped ahc_no_async_buffer (lowest-signal ablation per
# A_ahc-algorithm.md §6.1) to bring config count 4→3 (~25% spend cut). Subset
# task count further via launch flag: `--max-tasks-per-cell=10` brings cells
# from ~30 (AT) / ~30 (LME-med) → 10 each (~3x cheaper). With both cuts:
# E2 OpenRouter spend ≈ $5-8 (target headroom: 4-5x).
#
# AHC flag map (src/core/flags.ts):
#   TASK_AWARE_EXTRACTION — observer Tier-2 enrichment
#   TYPE_AWARE_OFFLOAD    — Type-Aware Offloader to scratchpad
#   TRAJECTORY_CLASSIFIER — Trajectory Classifier (per-turn class signal)
#   REFLECTION            — Reflection on Tier-2 size threshold
#
# tau-bench ablations deferred — E2 budget covers text only.
#
# Run (subsetted, recommended for E1 budget):
#   pnpm tsx scripts/eval.ts --sweep eval/sweeps/ablation_e2.yaml \
#     --concurrency=5 --max-tasks-per-cell=10
#
# Run (full, only if OpenRouter credit allows):
#   pnpm tsx scripts/eval.ts --sweep eval/sweeps/ablation_e2.yaml \
#     --concurrency=5

benches:
  - assistant-traj
  - longmemeval-med
configs:
  # Per H6.5/H6.7 audit (2026-05-14): ahc_full baseline must carry explicit flag
  # set (defaultFeatureFlags mostly OFF); without this fix `ahc_no_observer:
  # TASK_AWARE_EXTRACTION: false` was ablating from an already-false baseline =
  # null ablation. Each ahc_no_X mirrors ahc_full minus the single ablated flag.
  - id: ahc_full
    ahc_flags:
      TASK_AWARE_EXTRACTION: true
      TYPE_AWARE_OFFLOAD: true
      TRAJECTORY_CLASSIFIER: true
      RECALL_TOOL: true
  - id: ahc_no_observer
    ahc_flags:
      TASK_AWARE_EXTRACTION: false
      TYPE_AWARE_OFFLOAD: true
      TRAJECTORY_CLASSIFIER: true
      RECALL_TOOL: true
  - id: ahc_no_offloader
    ahc_flags:
      TASK_AWARE_EXTRACTION: true
      TYPE_AWARE_OFFLOAD: false
      TRAJECTORY_CLASSIFIER: true
      RECALL_TOOL: true
seeds: [42, 43]
budget_usd: 12
