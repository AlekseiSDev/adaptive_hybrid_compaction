name: smoke_dual_lme_mt_litellm
# Dual-mode routing smoke (2026-05-27) — lme-multiturn × LiteLLM endpoint.
# Verifies resolveLLMClient default path (openai/ → LiteLLM, strip prefix).
#
# AHC core path: ahc_flags.model='openai/gpt-5.4-mini' → resolveLLMClient
# returns {provider:litellm, baseURL:LITELLM_BASE_URL, model:'gpt-5.4-mini'}.
# Mastra path: reads AHC_ACTOR_MODEL env; un-set → default 'openai/gpt-5.4-mini'
# → same dispatch.
#
# Live deps: LITELLM_BASE_URL + LITELLM_MASTER_KEY in .env.
# Run: pnpm tsx scripts/eval.ts --sweep eval/sweeps/smoke_dual_lme_mt_litellm.yaml \
#        --max-tasks-per-cell=1 --skip-auth-check

benches:
  - lme-multiturn

configs:
  # `gemini/gemini-3-flash` because LiteLLM proxy has alias `gemini-3-flash`
  # (strip `gemini/` prefix). Model exists in OPENROUTER_PRICING as alias
  # entry → cost computation works.
  - id: ahc_lme_litellm
    ahc_flags:
      model: gemini/gemini-3-flash
  - id: mastra_lme_litellm
    baseline: mastra-agent

seeds: [42]
budget_usd: 2
